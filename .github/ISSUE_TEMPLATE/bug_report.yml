name: Bug 报告
description: 提交一个 Bug 帮助我们改进
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间提交 Bug 报告！请尽可能详细地填写以下信息。

  - type: input
    id: device
    attributes:
      label: 设备信息
      description: 您的平板型号和硬件版本
      placeholder: "Xiaomi Pad 6S Pro 12.4 (sheng)"
    validations:
      required: true

  - type: input
    id: kernel_version
    attributes:
      label: 内核版本
      description: 您正在使用的内核版本号（来自构建脚本参数或 Release 文件名）
      placeholder: "例如: 7.1"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: 发行版和环境
      description: 您使用的发行版、桌面环境和架构
      placeholder: "Debian 13 / GNOME / ARM64"
    validations:
      required: true

  - type: dropdown
    id: boot_mode
    attributes:
      label: 启动模式
      description: 您使用的启动方式
      options:
        - "dual (双系统)"
        - "all (仅 Linux)"
        - "USB"
        - "chroot"
        - "其他"
    validations:
      required: true

  - type: input
    id: kernel_channel
    attributes:
      label: 内核通道
      description: Mainline 还是 Stable 通道
      placeholder: "mainline 或 stable"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志输出
      description: 相关日志、终端输出或 dmesg 信息。请使用 ``` 包裹多行代码
      placeholder: "粘贴相关日志..."
      render: shell
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 从仓库克隆开始到问题出现的完整操作步骤
      placeholder: |
        1. 克隆仓库
        2. 运行构建脚本
        3. 刷写镜像
        4. 出现以下错误...
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 您期望发生的结果
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生的结果
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他可能有帮助的信息（截图、相关 PR 引用等）
    validations:
      required: false
