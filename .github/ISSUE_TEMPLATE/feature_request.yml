name: 功能请求
description: 为本项目提出一个新功能或改进建议
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间提出改进建议！请尽可能详细地描述您的需求。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰简洁地描述您想要的功能
      placeholder: "我希望项目能够支持..."
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: 使用场景
      description: 什么样的场景下需要这个功能？解决了什么问题？
      placeholder: "当我在 ... 时，需要这个功能来 ..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 您认为这个功能对项目的重要性
      options:
        - "P0 — 关键（设备无法正常使用）"
        - "P1 — 重要（明显改善使用体验）"
        - "P2 — 中等（锦上添花）"
        - "P3 — 低优先级（可有可无）"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      description: 该功能属于哪个方面
      options:
        - "内核 / 驱动"
        - "构建脚本 / CI"
        - "Rootfs / 软件包"
        - "文档 / Wiki"
        - "工具 / 辅助脚本"
        - "其他"
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: 实现思路（可选）
      description: 如果您对如何实现有初步想法，请在这里描述
      placeholder: "可以参考 ... 的实现方式..."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 参考资料、截图、相关链接等
    validations:
      required: false
