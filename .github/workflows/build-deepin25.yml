name: 🐧 Build Deepin 25 Desktop (DDE)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0，用于获取kernel bundle)'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="deepin25-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Deepin 25 Desktop - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🐧 Deepin 25 Desktop (DDE) for ARM64

            ---

            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | Deepin版本 | 25 (crimson) |
            | 内核版本 | ${{ github.event.inputs.kernel_version }} |
            | 桌面环境 | Deepin Desktop Environment (DDE) 7.0 |

            ---

            ### 🔐 默认凭据
            - 用户名: `luser`
            - 密码: `luser`

            ---

            ### 🌐 语言环境
            - 系统语言: 英文 (en_US.UTF-8)
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deepin25:
    name: Build Deepin 25 Desktop
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap p7zip-full curl
      - name: Download kernel bundle
        run: |
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version }}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build RootFS
        id: build
        run: |
          chmod +x build-deepin25-rootfs.sh
          sudo ./build-deepin25-rootfs.sh ${{ github.event.inputs.kernel_version }}
          SEVEN_Z_FILE=$(ls deepin25_*.7z | head -1)
          echo "filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepin25-desktop
          path: ${{ steps.build.outputs.path }}
          retention-days: 7
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
