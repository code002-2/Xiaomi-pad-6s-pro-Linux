name: Build Fedora 44 Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - 'sheng-fedora-rootfs_build.sh'
      - 'lib/rootfs-common.sh'
      - '.github/workflows/build-fedora44.yml'
      - '.github/workflows/_rootfs-template.yml'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_rootfs-template.yml
    with:
      distro: fedora
      script: sheng-fedora-rootfs_build.sh
      kernel_version_default: '7.0'
      desktop_matrix: '["all"]'
      release_tag_prefix: fedora44
      release_body_title: "Fedora 44 Desktop"
      skip_release: ${{ github.event.inputs.skip_release }}
    secrets: inherit
