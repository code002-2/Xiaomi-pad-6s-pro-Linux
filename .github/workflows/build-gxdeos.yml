name: 🌀 Build GXDE OS

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        type: string
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="gxde-iso-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "GXDE OS ARM (Official ISO) - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🌀 GXDE OS ARM For SM8550
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | 架构 | ARM64 (aarch64) |
            | 系统版本 | GXDE OS 25.4 |
            | 构建方式 | **原生 ISO 解包提取 (Squashfs)** |
            
            ---
            
            ### 🔐 默认凭据
            - 普通用户: `luser` / 密码: `luser`
            - 管理员用户: `root` / 密码: `1234`
            
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-gxdeos:
    name: Extract & Build GXDE OS
    runs-on: ubuntu-24.04-arm
    needs: prepare-release

    steps:
      - uses: actions/checkout@v4
      
      - name: Install build and extraction tools
        run: |
          sudo apt update 
          # 🚨 安装必备工具，加入 aria2 下载神器
          sudo apt install -y libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils squashfs-tools aria2

      - name: Free up disk space (Maximize Build Space)
        run: |
          echo "🧹 正在清理 GitHub 服务器预装的无用臃肿环境 (腾出空间防 I/O 错误)..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          echo "📊 清理完毕，当前可用磁盘空间："
          df -h /

      - name: Download ISO and Kernel bundles
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.0"; fi
          
          echo "⬇️ 正在下载本地内核..."
          gh release download "kernel-bundle-${KERNEL_VER}" \
            --repo "${{ github.repository }}" --clobber || true
            
          echo "⬇️ 正在从镜像站智能解析并下载 GXDE ISO 文件..."
          BASE_URL="https://mirror.nyist.edu.cn/GXDE/ISO/25.4/arm64/"
          
          ISO_NAME=$(curl -s "$BASE_URL" | grep -oP 'href="\K[^"]+\.iso' | head -n 1)
          
          if [ -z "$ISO_NAME" ]; then
            echo "❌ 无法解析到 ISO 文件名，请检查链接或镜像站状态！"
            exit 1
          fi
          
          echo "✅ 成功找到 ISO 文件: $ISO_NAME"
          echo "🚀 启动 aria2c 多线程引擎进行防断流暴力下载..."
          
          # 🚨 使用 aria2c 开 16 个线程同时下载，分块校验，保证 100% 完整无损！
          aria2c -x 16 -s 16 -j 16 --retry-wait=3 --max-tries=20 --continue=true "${BASE_URL}${ISO_NAME}"
          
          echo "📊 下载完成，进行文件体积验证："
          ls -lh *.iso
          
          # 🚨 验证文件是否大于 2.5GB，防止拿到残缺文件去解压报错
          FILESIZE=$(stat -c%s "$ISO_NAME")
          if [ "$FILESIZE" -lt 2500000000 ]; then
             echo "❌ 致命错误: ISO 文件体积过小 ($FILESIZE bytes)，镜像站文件可能不完整！"
             exit 1
          fi
          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.0"; fi
          
          chmod +x sheng-gxdeos-iso_build.sh
          
          DOWNLOADED_ISO=$(ls *.iso | head -n 1)
          echo "即将使用 ISO: $DOWNLOADED_ISO 进行解包构建"
          
          sudo ./sheng-gxdeos-iso_build.sh ${KERNEL_VER} "$DOWNLOADED_ISO"
          
          SEVEN_Z_FILE=$(ls gxdeos_iso_desktop_*.7z | head -1)
          echo "filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gxdeos-desktop
          path: ${{ steps.build.outputs.path }}
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
