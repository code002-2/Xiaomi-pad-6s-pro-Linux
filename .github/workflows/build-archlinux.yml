name: 🐧 Build Arch Linux RootFS

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        type: choice
        options:
          - all
          - server-only
          - desktop-only
        default: 'all'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false

jobs:
  build-server:
    name: Build Arch Linux Server
    runs-on: ubuntu-24.04-arm
    if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'server-only'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support p7zip-full
      - name: Build RootFS (Server)
        run: |
          chmod +x build-archlinux-rootfs.sh
          sudo ./build-archlinux-rootfs.sh server
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-server
          path: archlinux_server_*.7z
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: archlinux-rootfs-${{ github.run_number }}
          files: archlinux_server_*.7z

  build-desktop:
    name: Build Arch Linux Desktop
    runs-on: ubuntu-24.04-arm
    if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'desktop-only'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support p7zip-full
      - name: Build RootFS (Desktop)
        run: |
          chmod +x build-archlinux-rootfs.sh
          sudo ./build-archlinux-rootfs.sh desktop
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-desktop
          path: archlinux_desktop_*.7z
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: archlinux-rootfs-${{ github.run_number }}
          files: archlinux_desktop_*.7z
