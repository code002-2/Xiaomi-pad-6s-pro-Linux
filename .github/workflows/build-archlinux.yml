name: рҹҢҖ Build Arch Linux Desktop

on:
  workflow_dispatch:
    inputs:
      desktop_env:
        description: 'йҖүжӢ©иҰҒжһ„е»әзҡ„жЎҢйқўзҺҜеўғ'
        required: true
        type: choice
        options:
          - all
          - gnome
          - kde
        default: 'all'
      skip_release:
        description: 'и·іиҝҮеҲӣе»әGitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          DE_SUFFIX="${{ github.event.inputs.desktop_env || 'gnome' }}"
          TAG="archlinux-${DE_SUFFIX}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Arch Linux Desktop (${{ github.event.inputs.desktop_env || 'gnome' }}) - ${{ steps.tag.outputs.release_tag }}"
          body: |
            рҹҢҖ Arch Linux ARM Desktop For SM8550

            ---

            ### рҹ“Ӣ жһ„е»әдҝЎжҒҜ
            | йЎ№зӣ® | иҜҰжғ… |
            |------|------|
            | жһ¶жһ„ | ARM64 (aarch64) |
            | еҶ…ж ёзүҲжң¬ | 7.1.0 |
            | жЎҢйқўзҺҜеўғ | ${{ github.event.inputs.desktop_env || 'GNOME' }} |

            ---

            ### рҹ”җ й»ҳи®ӨеҮӯжҚ®
            - жҷ®йҖҡз”ЁжҲ·: `luser` / еҜҶз Ғ: `luser`
            - з®ЎзҗҶе‘ҳз”ЁжҲ·: `root` / еҜҶз Ғ: `1234`

            ---

            ### рҹ“Ұ й•ңеғҸж–Үд»¶
            жһ„е»әе®ҢжҲҗеҗҺе°ҶеҮәзҺ°еңЁдёӢж–№йҷ„д»¶дёӯгҖӮи§ЈеҺӢеҗҺиҜ·зӣҙжҺҘдҪҝз”Ё fastboot flash еҲ·е…ҘгҖӮ
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arch:
    name: Build Arch Linux Desktop
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt update && sudo apt install -y libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils

      - name: Download kernel, sensor and mesa packages
        run: |
          gh release download "kernel-7.1.0" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true
          gh release download "sensor" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true
          gh release download "xiaomi-mipps-auth" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true

          echo "в¬ҮпёҸ жӯЈеңЁдёӢиҪҪ Debian Mesa dev еҢ…..."
          wget -q -O mesa-common-dev_26.0.7-1_arm64.deb "http://ftp.br.debian.org/debian/pool/main/m/mesa/mesa-common-dev_26.0.8-1_arm64.deb"

          echo "рҹ“Ҙ дёӢиҪҪзҡ„ж–Үд»¶еҲ—иЎЁ:"
          ls -la
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          TARGET_DE="${{ github.event.inputs.desktop_env || 'gnome' }}"

          chmod +x sheng-arch-rootfs_build.sh
          sudo bash sheng-arch-rootfs_build.sh archlinux "7.1.0" "${TARGET_DE}"

          PKG_COUNT=$(ls -1 *.7z 2>/dev/null | wc -l)
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-desktop-${{ github.event.inputs.desktop_env || 'gnome' }}
          path: "*.7z"
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release && steps.build.outputs.pkg_count > 0 }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
