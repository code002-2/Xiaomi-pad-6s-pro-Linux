name: 🌀 Build Arch Linux RootFS

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "内核版本号 (需与 Release 中的一致，如: 7.1.0-rc6)"
        required: true
        default: "7.1.0-rc6"
      desktop_env:
        description: "选择要打包的桌面环境"
        required: true
        type: choice
        options:
          - all      # 同时打包 GNOME 和 KDE 两个版本
          - gnome    # 仅打包 GNOME 全家桶
          - kde      # 仅打包 KDE Plasma
        default: "all"

jobs:
  build_rootfs:
    name: "构建 Arch Linux (${{ github.event.inputs.desktop_env }})"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: "📥 检出脚本代码"
        uses: actions/checkout@v4

      - name: "🔧 部署构建环境"
        run: |
          sudo apt update
          sudo apt install -y p7zip-full android-sdk-libsparse-utils wget libarchive-tools

      - name: "📦 拉取通用内核与固件包"
        run: |
          echo "正在从 Release 下载通用内核..."
          # 请确保下面的仓库地址是你的真实仓库！
          GITHUB_REPO="你的名字/sm8550-mainline"
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          
          # 下载之前跑好的内核 .deb
          wget -q https://github.com/${GITHUB_REPO}/releases/download/unified-kernel-${KERNEL_VER}/linux-xiaomi-sheng.deb
          wget -q https://github.com/${GITHUB_REPO}/releases/download/unified-kernel-${KERNEL_VER}/firmware-xiaomi-sheng.deb

      - name: "🔨 执行多桌面智能构建脚本"
        run: |
          chmod +x sheng-arch-rootfs_build.sh
          # 将下拉菜单的选择参数传递给脚本
          sudo bash sheng-arch-rootfs_build.sh arch "${{ github.event.inputs.kernel_version }}" "${{ github.event.inputs.desktop_env }}"

      - name: "📤 收集构建产物 (.7z)"
        id: collect_artifacts
        run: |
          PKG_COUNT=$(ls -1 *.7z 2>/dev/null | wc -l)
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: "🏷️ 自动发布 RootFS Release"
        if: steps.collect_artifacts.outputs.pkg_count > 0 && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: arch-rootfs-${{ github.event.inputs.kernel_version }}-${{ github.event.inputs.desktop_env }}
          name: "🖥️ Arch RootFS v${{ github.event.inputs.kernel_version }} (${{ github.event.inputs.desktop_env }})"
          body: |
            🧩 *Arch Linux 刷机包**
            
            ### 🔧 构建参数
            - **内核支持**: 匹配 `v${{ github.event.inputs.kernel_version }}`
            - **桌面环境**: `${{ github.event.inputs.desktop_env }}` 
            - **打包状态**: 包含全量 UFS 驱动及高通闭源固件修复。
            
            ### 🚀 刷机指南
            1. 下载对应的 `.7z` 压缩包并解压得到 `.img` 镜像文件。
            2. 重启平板至 Fastboot 模式。
            3. 执行: `fastboot flash linux <解压出的.img>`
            4. **警告**: 切记要配合对应版本的 `boot.img` 食用以防 Kernel Panic！
          draft: false
          prerelease: false
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
