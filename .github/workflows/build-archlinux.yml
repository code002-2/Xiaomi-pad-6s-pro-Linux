name: 🌀 Build Arch Linux Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.1)'
        required: true
        type: string
        default: '7.1'
      desktop_env:
        description: '选择要构建的桌面环境'
        required: true
        type: choice
        options:
          - all
          - gnome
          - kde
        default: 'all'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          DE_SUFFIX="${{ github.event.inputs.desktop_env || 'gnome' }}"
          TAG="archlinux-${DE_SUFFIX}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Arch Linux Desktop (${{ github.event.inputs.desktop_env || 'gnome' }}) - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🌀 Arch Linux ARM Desktop For SM8550
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | 架构 | ARM64 (aarch64) |
            | 内核版本 | ${{ github.event.inputs.kernel_version || '7.1' }} |
            | 桌面环境 | ${{ github.event.inputs.desktop_env || 'GNOME' }} |
            
            ---
            
            ### 🔐 默认凭据
            - 普通用户: `luser` / 密码: `luser`
            - 管理员用户: `root` / 密码: `1234`
            
            ---
            
            ### 📦 镜像文件
            构建完成后将出现在下方附件中。解压后请直接使用 fastboot flash 刷入。
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arch:
    name: Build Arch Linux Desktop
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build tools
        run: sudo apt update && sudo apt install -y libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils
      
      - name: Download kernel and system bundles
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version || '7.1' }}"
          
          # 从 GitHub Release 拉取内核和固件包 
          # 🚨注意：如果你的内核Release标签名变了，请同步修改这里的 "kernel-bundle-${KERNEL_VER}"
          gh release download "kernel-bundle-${KERNEL_VER}" \
            --repo "${{ github.repository }}" --clobber || true
          
          echo "⬇️ 正在下载 Debian Mesa dev 包..."
          wget -q -O mesa-common-dev_26.0.7-1_arm64.deb "http://ftp.br.debian.org/debian/pool/main/m/mesa/mesa-common-dev_26.0.8-1_arm64.deb"
          
          echo "📥 下载的文件列表:"
          ls -la
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version || '7.1' }}"
          TARGET_DE="${{ github.event.inputs.desktop_env || 'gnome' }}"
          
          chmod +x sheng-arch-rootfs_build.sh
          sudo bash sheng-arch-rootfs_build.sh archlinux "${KERNEL_VER}" "${TARGET_DE}"
          
          PKG_COUNT=$(ls -1 *.7z 2>/dev/null | wc -l)
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-desktop-${{ github.event.inputs.desktop_env || 'gnome' }}
          path: "*.7z"
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release && steps.build.outputs.pkg_count > 0 }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
