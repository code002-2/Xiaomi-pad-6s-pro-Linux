name: 🎮 Build Freedreno/Turnip GPU Driver (Mesa) as .deb

on:
  workflow_dispatch:
    inputs:
      mesa_version:
        description: 'Mesa 版本 (tag或分支，如 main, 24.3, 25.0)'
        required: true
        default: '24.3'
      build_type:
        description: '构建类型'
        type: choice
        options:
          - release
          - debug
        default: 'release'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false

jobs:
  build-mesa-freedreno-turnip:
    name: Build Mesa (Freedreno/Turnip) .deb
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout repository (for script)
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git python3-pip python3-setuptools \
            ninja-build pkg-config \
            libdrm-dev libx11-dev libxext-dev libxdamage-dev \
            libxcb-glx0-dev libxcb-shm0-dev libxcb-dri2-0-dev \
            libxcb-dri3-dev libxcb-present-dev libxshmfence-dev \
            libxxf86vm-dev libxrandr-dev libxfixes-dev libwayland-dev \
            wayland-protocols libxcb-randr0-dev libvulkan-dev \
            libelf-dev libexpat1-dev libzstd-dev \
            dpkg-dev debhelper fakeroot

      - name: Upgrade meson to >=1.4.0
        run: |
          pip3 install --upgrade meson
          # 确保 pip 安装的 meson 在 PATH 最前面
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          meson --version

      - name: Clone Mesa source
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.mesa_version }} \
            https://gitlab.freedesktop.org/mesa/mesa.git mesa-source
          cd mesa-source
          echo "MESA_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Configure build with Meson
        run: |
          cd mesa-source
          meson setup builddir/ \
            --prefix=/usr \
            --libdir=lib/aarch64-linux-gnu \
            --buildtype=${{ github.event.inputs.build_type }} \
            -D platforms=x11,wayland \
            -D gallium-drivers=freedreno \
            -D vulkan-drivers=freedreno \
            -D freedreno-kgsl=true \
            -D gles1=disabled \
            -D gles2=enabled \
            -D glx=dri

      - name: Compile Mesa
        run: |
          cd mesa-source
          ninja -C builddir/

      - name: Package into .deb
        run: |
          cd mesa-source
          # 创建临时打包目录
          mkdir -p debian/usr/lib/aarch64-linux-gnu/
          # 安装到临时目录
          DESTDIR=$(pwd)/debian ninja -C builddir/ install
          # 提取需要打包的驱动相关文件
          mkdir -p debian/DEBIAN
          cat > debian/DEBIAN/control <<EOF
          Package: mesa-freedreno-turnip
          Version: ${{ github.event.inputs.mesa_version }}-git${{ env.MESA_COMMIT }}
          Architecture: arm64
          Maintainer: GitHub Actions <actions@github.com>
          Description: Freedreno (OpenGL) and Turnip (Vulkan) drivers for Qualcomm Adreno GPUs
           Built from Mesa commit ${{ env.MESA_COMMIT }}.
          Depends: libc6, libdrm2, libx11-6, libxext6, libxdamage1, libxcb-glx0, libxcb-shm0, libxcb-dri2-0, libxcb-dri3-0, libxcb-present0, libxshmfence1, libxxf86vm1, libxrandr2, libxfixes3, libwayland-client0, libvulkan1
          EOF
          # 计算文件大小并生成md5sums
          cd debian
          find usr -type f -exec md5sum {} \; > DEBIAN/md5sums
          cd ..
          # 构建 .deb 包
          dpkg-deb --build debian mesa-freedreno-turnip_${{ github.event.inputs.mesa_version }}-git${{ env.MESA_COMMIT }}_arm64.deb

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-freedreno-turnip
          path: mesa-source/*.deb
          retention-days: 14

      - name: Create Release and upload .deb
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: mesa-freedreno-turnip-${{ github.event.inputs.mesa_version }}-${{ env.MESA_COMMIT }}
          name: "Mesa Freedreno/Turnip Driver - ${{ github.event.inputs.mesa_version }}"
          body: |
            Built from Mesa commit ${{ env.MESA_COMMIT }}
            
            **包含驱动**:
            - Freedreno (OpenGL ES / Desktop OpenGL)
            - Turnip (Vulkan)
            
            **安装方法**:
            ```bash
            sudo dpkg -i mesa-freedreno-turnip_*.deb
            sudo apt install -f  # 解决依赖
            ```
          files: mesa-source/*.deb
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
