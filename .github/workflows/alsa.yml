name: Build ALSA + Firmware DEB (ARM64)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "内核版本号 (如: 7.1)"
        required: true
        default: "7.1"

jobs:
  build:
    name: "构建 ALSA + 固件 v${{ inputs.kernel_version }}"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 设置构建环境
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev bc \
            ccache clang llvm lld wget xz-utils

          mkdir -p /home/runner/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros

      - name: 构建 ALSA + 固件包
        id: build
        run: |
          export CCACHE_DIR=/home/runner/.ccache
          export CCACHE_MAXSIZE=10G
          export PATH="/usr/lib/ccache:$PATH"

          # Build firmware package
          TMPFW=$(mktemp -d)
          git clone --depth 1 https://github.com/lzxcr/linux-firmware-sheng.git "$TMPFW/fw"
          mkdir -p firmware-xiaomi-sheng/usr/lib
          if [ -d "$TMPFW/fw/lib" ]; then
            cp -r "$TMPFW/fw/lib"/* firmware-xiaomi-sheng/usr/lib/
          else
            cp -r "$TMPFW/fw"/* firmware-xiaomi-sheng/usr/lib/ || true
          fi
          rm -rf "$TMPFW"

          # Build ALSA package
          TMPSA=$(mktemp -d)
          git clone --depth 1 https://github.com/map220v/alsa-ucm-conf.git "$TMPSA/alsa"
          mkdir -p alsa-xiaomi-sheng/usr/share/alsa/ucm2
          if [ -d "$TMPSA/alsa/ucm2" ]; then
            cp -r "$TMPSA/alsa/ucm2"/* alsa-xiaomi-sheng/usr/share/alsa/ucm2/
          else
            cp -r "$TMPSA/alsa"/* alsa-xiaomi-sheng/usr/share/alsa/ucm2/ || true
          fi
          rm -rf "$TMPSA"

          # Build DEBs
          dpkg-deb --root-owner-group --build firmware-xiaomi-sheng
          dpkg-deb --root-owner-group --build alsa-xiaomi-sheng

          echo "✅ 构建完成"

      - name: 收集编译产物
        id: collect_artifacts
        run: |
          PKG_COUNT=$(ls -1 *.deb 2>/dev/null | wc -l)
          echo "📦 共找到 $PKG_COUNT 个包文件"
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: alsa-firmware-${{ inputs.kernel_version }}
          path: "*.deb"
          retention-days: 7
          if-no-files-found: error

      - name: 创建 GitHub Release
        if: steps.collect_artifacts.outputs.pkg_count > 0
        uses: softprops/action-gh-release@v1
        with:
          tag_name: alsa
          name: "alsa-firmware"
          draft: false
          prerelease: false
          files: "*.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
