name: Build iio-sensor-proxy-ssc DEB (ARM64)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    env:
      PKGNAME: iio-sensor-proxy-ssc
      PKGVERSION: 3.8
      PKGREL: 1

    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            git \
            wget \
            dpkg-dev \
            libglib2.0-dev \
            libgudev-1.0-dev \
            libgtk-3-dev \
            libpolkit-gobject-1-dev \
            systemd \
            libsystemd-dev \
            libqmi-glib-dev \
            libmbim-glib-dev \
            linux-libc-dev \
            protobuf-compiler \
            protobuf-c-compiler

      - name: "Download libssc"
        id: download_libssc
        run: |
          
          # GitHub CLI Release
          gh release download "libssc" \
            --pattern "*.deb" \
            --repo "${{ github.repository }}" \
            --clobber
          
          DEB_COUNT=$(ls -1 *.deb 2>/dev/null | wc -l)
          if [ $DEB_COUNT -eq 0 ]; then
            echo "❌ 错误：未下载到任何内核包！"
            exit 1
          fi
          
          echo "✅ 成功下载 $DEB_COUNT 个内核包"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install libssc
        run: |
          sudo dpkg -i *.deb
          sudo ldconfig
          
          echo "🔍 Checking libssc..."
          pkg-config --modversion libssc || true

      - name: Download source
        run: |
          wget https://gitlab.freedesktop.org/hadess/iio-sensor-proxy/-/archive/${PKGVERSION}/iio-sensor-proxy-${PKGVERSION}.tar.gz
          tar -xf iio-sensor-proxy-${PKGVERSION}.tar.gz

      - name: Build project
        run: |
          cd iio-sensor-proxy-${PKGVERSION}
          meson setup build \
            --prefix=/usr \
            -Dsystemdsystemunitdir=/usr/lib/systemd/system \
            -Dudevrulesdir=/usr/lib/udev/rules.d \
            -Dsysconfdir=/usr/share
          meson compile -C build

      - name: Install into staging
        run: |
          cd iio-sensor-proxy-${PKGVERSION}
          DESTDIR=$PWD/stage meson install -C build

      - name: Prepare DEB structure
        run: |
          mkdir -p deb/DEBIAN
          cp -r iio-sensor-proxy-${PKGVERSION}/stage/usr deb/

          cat > deb/DEBIAN/control <<EOF
          Package: ${PKGNAME}
          Version: ${PKGVERSION}-${PKGREL}
          Section: misc
          Priority: optional
          Architecture: arm64
          Maintainer: Fauzan Amir Al Ghiffary <alghiffaryfa19@gmail.com>
          Depends: systemd, libglib2.0-0, libgudev-1.0-0, libpolkit-gobject-1-0
          Description: IIO accelerometer sensor to input device proxy (SSC enabled)
           iio-sensor-proxy built with Qualcomm SSC support.
          EOF

      - name: Fix permissions
        run: |
          find deb -type d -exec chmod 755 {} \;
          find deb -type f -exec chmod 644 {} \;

      - name: Build DEB
        run: |
          dpkg-deb --build deb
          mv deb.deb ${PKGNAME}_${PKGVERSION}-${PKGREL}_arm64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iio-sensor-proxy-ssc-deb
          path: iio-sensor-proxy-ssc_*.deb

      - name: "Release"
        uses: softprops/action-gh-release@v1
        with:
          tag_name: iio_sensor
          name: "iio_sensor"
          draft: false
          prerelease: false
          files: "*.deb"
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}