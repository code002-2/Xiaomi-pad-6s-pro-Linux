name: Build Kernel-Stable

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "内核版本号 (如: 7.0)"
        required: true
        default: "7.0"

jobs:
  build:
    name: "构建内核 v${{ github.event.inputs.kernel_version || '7.0' }}"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: "📥 检出代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: "💾 设置ccache缓存"
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-kernel-${{ github.event.inputs.kernel_version || '7.0' }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-kernel-${{ github.event.inputs.kernel_version || '7.0' }}-
            ${{ runner.os }}-ccache-kernel-

      - name: "🔧 设置构建环境"
        run: |
          echo "⚙️ 正在安装必要的构建工具..."
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev bc ccache clang llvm lld
          echo "✅ 构建工具安装完成"
          
          # 确保ccache目录存在（无论缓存是否命中）
          mkdir -p /home/runner/.ccache
          
          # 优化ccache配置
          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros
          
          echo "📊 缓存恢复状态: ${{ steps.cache-ccache.outputs.cache-hit }}"

      - name: "🔨 编译内核"
        id: build
        run: |
          echo "🚀 开始编译内核版本 ${{ github.event.inputs.kernel_version || '7.0' }}"
          echo "💾 缓存状态: ${{ steps.cache-ccache.outputs.cache-hit }}"
          
          # 设置ccache环境变量，确保编译过程使用ccache
          export CCACHE_DIR=/home/runner/.ccache
          export CCACHE_MAXSIZE=10G
          export PATH="/usr/lib/ccache:$PATH"
          
          # 执行编译
          # 传递环境变量给编译脚本
          bash sheng-kernel-Stable_build.sh "${{ github.event.inputs.kernel_version || '7.0' }}" "${{ github.workspace }}"
          
          echo "✅ 内核编译完成"
          echo "📊 编译后ccache统计:"
          ccache --show-stats --verbose | grep -E "(hit rate|cache hit|cache miss|max size)" || true

      - name: "📦 收集编译产物"
        id: collect_artifacts
        run: |
          echo "🔍 查找编译产物..."
          find . -name "*.deb" -type f | head -20
          
          echo "📁 编译产物列表:"
          ls -la *.deb 2>/dev/null || echo "⚠️  未找到 .deb 文件"
          echo ""
          echo "📊 文件大小统计:"
          du -h *.deb 2>/dev/null || echo "暂无产物文件"
          
          # 统计包数量并输出，供后续步骤使用
          PKG_COUNT=$(ls -1 *.deb 2>/dev/null | wc -l)
          echo "📦 共找到 $PKG_COUNT 个包文件"
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: "📤 上传构建产物"
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.event.inputs.kernel_version || '7.0' }}
          path: "*.deb"
          retention-days: 7
          if-no-files-found: error

      - name: Upload single boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot_single.img
          path: ${{ github.workspace }}/boot_sheng_singleboot.img

      - name: Upload dual boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot_dual.img
          path: ${{ github.workspace }}/boot_sheng_dualboot.img

      - name: "🏷️ 创建GitHub Release"
        if: steps.collect_artifacts.outputs.pkg_count > 0 && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel-${{ github.event.inputs.kernel_version || '7.0' }}
          name: "Kernel ${{ github.event.inputs.kernel_version || '7.0' }}"
          body: |
            🧩 Kernel ${{ github.event.inputs.kernel_version || '7.0' }}
            
            --- 
            
            ### 🔧 构建信息
            | 项目 | 详情 |
            |------|------|
            | 内核版本 | ${{ github.event.inputs.kernel_version || '7.0' }} |
            | 构建方式 | GitHub Actions 自动构建 |
            
            --- 
            
            ### 📦 包含包
            - linux-xiaomi-sheng.deb
            - firmware-xiaomi-sheng.deb  
            - alsa-xiaomi-sheng.deb
            - install.7z
          draft: false
          prerelease: false
          files: "*.deb"
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
