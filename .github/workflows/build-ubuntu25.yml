name: 🐧 Build Ubuntu 24.04 RootFS

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        default: '7.0'
      build_type:
        description: '构建类型'
        type: choice
        options:
          - all
          - server-only
          - desktop-only
        default: 'all'
      skip_release:
        description: '跳过创建Release'
        type: boolean
        default: false

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="ubuntu24-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Ubuntu 24.04 for Sheng - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🐧 Ubuntu 24.04 (Noble) for Sheng
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | Ubuntu版本 | 24.04 LTS (Noble) |
            | 内核版本 | ${{ github.event.inputs.kernel_version }} |
            | 构建类型 | ${{ github.event.inputs.build_type }} |
            
            ---
            
            ### 🔐 默认凭据
            
            **服务器版**
            - 用户名: `root`
            - 密码: `1234`
            
            **桌面版**
            - 用户名: `luser`
            - 密码: `luser`
            - 桌面: GNOME + GDM3
            
            ---
            
            ### 📦 镜像文件
            构建完成后的文件将出现在下方附件中。
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-server:
    name: Build Ubuntu 24.04 Server
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    if: |
      github.event.inputs.build_type == 'all' ||
      github.event.inputs.build_type == 'server-only'
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap p7zip-full curl
      - name: Download kernel bundle
        run: |
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version }}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build RootFS (Server)
        id: build
        run: |
          chmod +x build-ubuntu25-rootfs.sh
          sudo ./build-ubuntu25-rootfs.sh server ${{ github.event.inputs.kernel_version }}
          SEVEN_Z_FILE=$(ls ubuntu24_*.7z | head -1)
          echo "filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.filename }}
          path: ${{ steps.build.outputs.path }}
          retention-days: 7
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: Build Ubuntu 24.04 Desktop
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    if: |
      github.event.inputs.build_type == 'all' ||
      github.event.inputs.build_type == 'desktop-only'
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap p7zip-full curl
      - name: Download kernel bundle
        run: |
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version }}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build RootFS (Desktop)
        id: build
        run: |
          chmod +x build-ubuntu25-rootfs.sh
          sudo ./build-ubuntu25-rootfs.sh desktop ${{ github.event.inputs.kernel_version }}
          SEVEN_Z_FILE=$(ls ubuntu24_*.7z | head -1)
          echo "filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.filename }}
          path: ${{ steps.build.outputs.path }}
          retention-days: 7
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
