name: Build Component DEBs (ARM64)

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to build (all, fastrpc, libssc, iio, sensors, devauth, alsa)'
        required: true
        type: choice
        options: [all, fastrpc, libssc, iio, sensors, devauth, alsa]
        default: 'all'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fastrpc
            tag: fastrpc
            release: fastrpc
            version: 1.0.2
            rel: 1
            sources: qualcomm/fastrpc
            build_depends: autoconf automake libtool pkg-config wget unzip libyaml-dev
            deb_depends: libyaml-0-2, systemd
            deb_desc: "Qualcomm FastRPC userspace library\n FastRPC implementation for Qualcomm DSP communication."

          - name: libssc
            tag: libssc
            release: libssc
            version: 0.3.0
            rel: 1
            sources: DylanVanAssche/libssc
            build_depends: ninja-build pkg-config python3-pip libglib2.0-dev libprotobuf-c-dev libqmi-glib-dev libmbim-glib-dev linux-libc-dev protobuf-compiler protobuf-c-compiler
            deb_depends: libglib2.0-0, libprotobuf-c1, libqmi-glib5
            deb_desc: "Library to expose Qualcomm Sensor Core sensors\n libssc userspace library for Qualcomm SSC."

          - name: iio
            tag: iio_sensor_patched
            release: iio_sensor_patched
            version: 3.9
            rel: 6
            sources: hadess/iio-sensor-proxy
            build_depends: ninja-build pkg-config wget dpkg-dev python3-pip libglib2.0-dev libgudev-1.0-dev libpolkit-gobject-1-dev libsystemd-dev libdbus-1-dev systemd libqmi-glib-dev libmbim-glib-dev linux-libc-dev protobuf-compiler protobuf-c-compiler
            deb_depends: dbus, libglib2.0-0, libgudev-1.0-0, libpolkit-gobject-1-0
            deb_desc: "IIO sensors to D-Bus proxy (SSC patched)\n iio-sensor-proxy with Qualcomm Sensor Core support."

          - name: sensors
            tag: sensors
            release: sensors
            version: 20240917
            rel: 1
            sources: alghiffaryfa19/sheng-sensors-file
            commit: 199754bb37ae6d4706bd8d4b23e9e6fec2d959cc
            build_depends: wget dpkg-dev
            deb_depends: ''
            deb_desc: "Sensor files for Xiaomi Pad 6s Pro\n Proprietary sensor configuration files."

          - name: devauth
            tag: sheng_devauth
            release: sheng_devauth
            version: 1.0
            sources: map220v/sheng_devauth
            build_depends: build-essential dpkg-dev
            deb_depends: ''
            deb_desc: "Xiaomi keyboard authentication service\n Service used in pair with kernel driver to authenticate Xiaomi devices."

          - name: alsa
            tag: alsa
            release: alsa
            version: 1.0
            sources: ''
            build_depends: ''
            deb_depends: ''
            deb_desc: 'ALSA UCM2 configuration and firmware for Xiaomi Pad 6s Pro'

    steps:
      - name: Filter by input
        id: filter
        run: |
          INPUT="${{ github.event.inputs.component }}"
          MATRIX="${{ join(matrix.name, ',') }}"
          if [ "$INPUT" = "all" ]; then
            echo "building=all" >> $GITHUB_OUTPUT
          elif echo ",$MATRIX," | grep -q ",$INPUT,"; then
            echo "building=$INPUT" >> $GITHUB_OUTPUT
          else
            echo "building=$INPUT" >> $GITHUB_OUTPUT
          fi

      # --- fastrpc ---
      - name: Build fastrpc
        if: matrix.name == 'fastrpc' && (github.event.inputs.component == 'all' || github.event.inputs.component == 'fastrpc')
        run: |
          sudo apt update
          sudo apt install -y build-essential ${{ matrix.build_depends }}

          wget https://github.com/${{ matrix.sources }}/archive/refs/tags/v${{ matrix.version }}.zip
          unzip v${{ matrix.version }}.zip

          cd fastrpc-${{ matrix.version }}
          autoreconf -is
          ./configure --prefix=/usr
          make -j$(nproc)

          mkdir -p stage
          make DESTDIR=$PWD/stage install

          mkdir -p stage/usr/lib/systemd/system
          wget -O adsprpcd-sensorspd.service \
            https://raw.githubusercontent.com/alghiffaryfa19/sheng-sensors-patch/refs/heads/main/fastrpc-1.0.2/adsprpcd-sensorspd.service
          cp adsprpcd-sensorspd.service stage/usr/lib/systemd/system/

          mkdir -p deb/DEBIAN
          cp -r fastrpc-${{ matrix.version }}/stage/usr deb/
          cat > deb/DEBIAN/control <<EOF
Package: fastrpc
Version: ${{ matrix.version }}-${{ matrix.rel }}
Section: libs
Priority: optional
Architecture: arm64
Maintainer: Xiaomi Pad 6s Pro Linux Port <github@code002-2>
Depends: ${{ matrix.deb_depends }}
Description: ${{ matrix.deb_desc }}
EOF

          find deb -type d -exec chmod 755 {} \;
          # Preserve executable bits on scripts, set 644 on regular files
          find deb -type f -name "*.sh" -exec chmod 755 {} \;
          find deb -type f -exec chmod 644 {} \;
          dpkg-deb --build deb
          mv deb.deb fastrpc_${{ matrix.version }}-${{ matrix.rel }}_arm64.deb

      # --- libssc ---
      - name: Build libssc
        if: matrix.name == 'libssc' && (github.event.inputs.component == 'all' || github.event.inputs.component == 'libssc')
        run: |
          sudo apt update
          sudo apt install -y build-essential ${{ matrix.build_depends }}
          pip3 install --upgrade meson

          git clone https://codeberg.org/${{ matrix.sources }}.git source
          cd source
          wget -O wait_for_qmi_service.patch \
            https://raw.githubusercontent.com/alghiffaryfa19/sheng-sensors-patch/refs/heads/main/libssc-git/wait_for_qmi_service.patch
          patch -Np1 < wait_for_qmi_service.patch || true

          meson setup build --prefix=/usr
          meson compile -C build
          DESTDIR=$PWD/stage meson install -C build

          mkdir -p deb/DEBIAN deb/usr
          cp -r source/stage/usr/* deb/usr/
          cat > deb/DEBIAN/control <<EOF
Package: libssc
Version: ${{ matrix.version }}-${{ matrix.rel }}
Section: libs
Priority: optional
Architecture: arm64
Maintainer: Xiaomi Pad 6s Pro Linux Port <github@code002-2>
Depends: ${{ matrix.deb_depends }}
Description: ${{ matrix.deb_desc }}
EOF
          find deb -type d -exec chmod 755 {} \;
          # Preserve executable bits on scripts, set 644 on regular files
          find deb -type f -name "*.sh" -exec chmod 755 {} \;
          find deb -type f -exec chmod 644 {} \;
          dpkg-deb --build deb
          mv deb.deb libssc_${{ matrix.version }}-${{ matrix.rel }}_arm64.deb

      # --- iio-sensor-proxy ---
      - name: Build iio-sensor-proxy
        if: matrix.name == 'iio' && (github.event.inputs.component == 'all' || github.event.inputs.component == 'iio')
        run: |
          sudo apt update
          sudo apt install -y build-essential ${{ matrix.build_depends }}
          pip3 install --upgrade meson

          # Download libssc dependency
          gh release download "libssc" --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true
          if ls *.deb >/dev/null 2>&1; then
            sudo dpkg -i *.deb
            sudo ldconfig
          fi

          wget https://gitlab.freedesktop.org/${{ matrix.sources }}/-/archive/${{ matrix.version }}/iio-sensor-proxy-${{ matrix.version }}.tar.gz
          tar -xf iio-sensor-proxy-${{ matrix.version }}.tar.gz
          cd iio-sensor-proxy-${{ matrix.version }}

          meson setup output --prefix=/usr -Db_lto=true -Dssc-support=enabled -Dsystemdsystemunitdir=/usr/lib/systemd/system
          meson compile -C output
          DESTDIR=$PWD/stage meson install --no-rebuild -C output

          mkdir -p deb/DEBIAN
          cp -r iio-sensor-proxy-${{ matrix.version }}/stage/usr deb/
          cat > deb/DEBIAN/control <<EOF
Package: iio-sensor-proxy
Version: 9999${{ matrix.version }}-${{ matrix.rel }}
Section: misc
Priority: optional
Architecture: arm64
Maintainer: Xiaomi Pad 6s Pro Linux Port <github@code002-2>
Depends: ${{ matrix.deb_depends }}
Description: ${{ matrix.deb_desc }}
EOF
          dpkg-deb --build deb
          mv deb.deb iio-sensor-proxy_9999${{ matrix.version }}-${{ matrix.rel }}_arm64.deb

      # --- sensors ---
      - name: Build sensors
        if: matrix.name == 'sensors' && (github.event.inputs.component == 'all' || github.event.inputs.component == 'sensors')
        run: |
          sudo apt update
          sudo apt install -y ${{ matrix.build_depends }}

          wget -O source.tar.gz \
            https://github.com/${{ matrix.sources }}/archive/${{ matrix.commit }}.tar.gz
          tar -xf source.tar.gz

          mkdir -p deb/DEBIAN
          cp -a sheng-sensors-file-${{ matrix.commit }}/. deb/
          cat > deb/DEBIAN/control <<EOF
Package: sheng-sensors
Version: ${{ matrix.version }}-${{ matrix.rel }}
Section: misc
Priority: optional
Architecture: arm64
Maintainer: Xiaomi Pad 6s Pro Linux Port <github@code002-2>
Description: ${{ matrix.deb_desc }}
EOF
          find deb -type d -exec chmod 755 {} \;
          # Preserve executable bits on scripts, set 644 on regular files
          find deb -type f -name "*.sh" -exec chmod 755 {} \;
          find deb -type f -exec chmod 644 {} \;
          dpkg-deb --build deb
          mv deb.deb sheng-sensors_${{ matrix.version }}-${{ matrix.rel }}_arm64.deb

      # --- devauth ---
      - name: Build devauth
        if: matrix.name == 'devauth' && (github.event.inputs.component == 'all' || github.event.inputs.component == 'devauth')
        run: |
          sudo apt update
          sudo apt install -y ${{ matrix.build_depends }}

          git clone https://github.com/${{ matrix.sources }}.git source
          cd source
          make

          mkdir -p sheng-devauth/usr/bin sheng-devauth/DEBIAN
          chmod 0755 source/xiaomi_devauth
          cp source/xiaomi_devauth sheng-devauth/usr/bin/

          cat > sheng-devauth/DEBIAN/postinst <<'POSTINST'
          #!/bin/sh
          set -e
          if command -v systemctl >/dev/null 2>&1; then
            systemctl daemon-reload || true
            systemctl enable sheng-devauth.service || true
            systemctl start sheng-devauth.service || true
          fi
          exit 0
          POSTINST
          chmod 0755 sheng-devauth/DEBIAN/postinst

          cat > sheng-devauth/DEBIAN/prerm <<'PRERM'
          #!/bin/sh
          set -e
          if command -v systemctl >/dev/null 2>&1; then
            systemctl stop sheng-devauth.service || true
            systemctl disable sheng-devauth.service || true
          fi
          exit 0
          PRERM
          chmod 0755 sheng-devauth/DEBIAN/prerm

          cat > sheng-devauth/DEBIAN/control <<EOF
          Package: sheng-devauth
          Version: ${{ matrix.version }}
          Section: misc
          Priority: optional
          Architecture: arm64
          Maintainer: Xiaomi Pad 6s Pro Linux Port <github@code002-2>
          Description: ${{ matrix.deb_desc }}
          EOF

          dpkg-deb --build sheng-devauth

      # --- alsa + firmware ---
      - name: Build alsa + firmware
        if: matrix.name == 'alsa' && (github.event.inputs.component == 'all' || github.event.inputs.component == 'alsa')
        run: |
          sudo apt install -y wget git dpkg-dev

          # Build firmware package
          TMPFW=$(mktemp -d)
          git clone --depth 1 https://github.com/lzxcr/linux-firmware-sheng.git "$TMPFW/fw"
          mkdir -p firmware-xiaomi-sheng/usr/lib
          if [ -d "$TMPFW/fw/lib" ]; then
            cp -r "$TMPFW/fw/lib"/* firmware-xiaomi-sheng/usr/lib/
          else
            cp -r "$TMPFW/fw"/* firmware-xiaomi-sheng/usr/lib/ || true
          fi
          rm -rf "$TMPFW"
          dpkg-deb --root-owner-group --build firmware-xiaomi-sheng

          # Build ALSA package
          TMPSA=$(mktemp -d)
          git clone --depth 1 https://github.com/map220v/alsa-ucm-conf.git "$TMPSA/alsa"
          mkdir -p alsa-xiaomi-sheng/usr/share/alsa/ucm2
          if [ -d "$TMPSA/alsa/ucm2" ]; then
            cp -r "$TMPSA/alsa/ucm2"/* alsa-xiaomi-sheng/usr/share/alsa/ucm2/
          else
            cp -r "$TMPSA/alsa"/* alsa-xiaomi-sheng/usr/share/alsa/ucm2/ || true
          fi
          rm -rf "$TMPSA"
          dpkg-deb --root-owner-group --build alsa-xiaomi-sheng

      # --- Release ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-deb
          path: '*.deb'

      - name: Release
        if: github.event.inputs.component == 'all' || github.event.inputs.component == matrix.name
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ matrix.tag }}
          name: "${{ matrix.release }}"
          draft: false
          prerelease: false
          files: "*.deb"
