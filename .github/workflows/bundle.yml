name: Build Kernel Bundle

on:
  workflow_run:
    workflows: ["Build Kernel"]
    types:
      - completed
    branches: [main, master]
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version"
        required: true
        default: "7.1"
      channel:
        description: "Kernel channel (mainline or stable)"
        required: true
        type: choice
        options: [mainline, stable]
        default: "mainline"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.channel || 'mainline' }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bundle:
    # Only run when the triggering workflow completed successfully
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v4

    - name: Download all source releases
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        KERNEL_VER="${{ github.event.inputs.kernel_version || '7.1' }}"
        CHANNEL="${{ github.event.inputs.channel || 'mainline' }}"

        mkdir bundle && cd bundle

        echo "Download kernel packages"
        gh release download "kernel-${CHANNEL}-${KERNEL_VER}" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber || { echo "Error: Failed to download kernel packages" >&2; exit 1; }

        echo "Download sheng_devauth"
        gh release download "sheng_devauth" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber || { echo "Error: Failed to download sheng_devauth" >&2; exit 1; }

        echo "Download sensor packages"
        gh release download "sensors" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber || { echo "Error: Failed to download sensors" >&2; exit 1; }

        echo "Final bundle:"
        ls -lah

        COUNT=$(ls *.deb 2>/dev/null | wc -l)
        if [ "$COUNT" -lt 5 ]; then
          echo "Not enough packages (found $COUNT, need >= 5)"
          exit 1
        fi
        echo "Bundle validated: $COUNT packages"

    - name: Create bundle release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "kernel-bundle-${{ github.event.inputs.channel || 'mainline' }}-${{ github.event.inputs.kernel_version || '7.1' }}"
        name: "Kernel Bundle ${{ github.event.inputs.channel || 'mainline' }} ${{ github.event.inputs.kernel_version || '7.1' }}"
        files: bundle/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
