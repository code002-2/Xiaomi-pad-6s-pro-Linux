name: Build Kernel Bundle

on:
  workflow_run:
    workflows: ["Build Kernel"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version"
        required: true
        default: "7.1"
      channel:
        description: "Kernel channel (mainline or stable)"
        required: true
        type: choice
        options: [mainline, stable]
        default: "mainline"

jobs:
  bundle:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download all source releases
      run: |
        KERNEL_VER="${{ github.event.inputs.kernel_version || '7.1' }}"
        CHANNEL="${{ github.event.inputs.channel || 'mainline' }}"

        mkdir bundle && cd bundle

        echo "⬇️ Download kernel packages"
        gh release download "kernel-${CHANNEL}-${KERNEL_VER}" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber || true

        echo "⬇️ Download sheng_devauth"
        gh release download "sheng_devauth" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber || true

        echo "⬇️ Download sensor"
        gh release download "sensor" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber || true

        echo "📂 Final bundle:"
        ls -lah

        COUNT=$(ls *.deb 2>/dev/null | wc -l)
        if [ "$COUNT" -lt 5 ]; then
          echo "❌ Not enough packages (found $COUNT, need >= 5)"
          exit 1
        fi
        echo "✅ Bundle validated: $COUNT packages"

      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create bundle release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: kernel-bundle-${{ github.event.inputs.kernel_version }}
        name: Kernel Bundle ${{ github.event.inputs.kernel_version }}
        files: bundle/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
