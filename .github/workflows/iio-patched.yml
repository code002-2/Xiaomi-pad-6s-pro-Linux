name: Build iio-sensor-proxy (SSC Patched) DEB (ARM64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    env:
      PKGNAME: iio-sensor-proxy
      PKGVERSION: 3.9
      PKGREL: 6

    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            ninja-build \
            pkg-config \
            git \
            wget \
            dpkg-dev \
            python3-pip \
            libglib2.0-dev \
            libgudev-1.0-dev \
            libpolkit-gobject-1-dev \
            libsystemd-dev \
            libdbus-1-dev \
            systemd \
            libqmi-glib-dev \
            libmbim-glib-dev \
            linux-libc-dev \
            protobuf-compiler \
            protobuf-c-compiler

          pip3 install --upgrade meson

      - name: Debug pkg-config
        run: |
          pkg-config --modversion gio-2.0 || true
          pkg-config --modversion glib-2.0 || true

      - name: "Download libssc"
        id: download_libssc
        run: |
          
          # GitHub CLI Release
          gh release download "libssc" \
            --pattern "*.deb" \
            --repo "${{ github.repository }}" \
            --clobber
          
          DEB_COUNT=$(ls -1 *.deb 2>/dev/null | wc -l)
          if [ $DEB_COUNT -eq 0 ]; then
            echo "❌ 错误：未下载到任何内核包！"
            exit 1
          fi
          
          echo "✅ 成功下载 $DEB_COUNT 个内核包"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install libssc
        run: |
          sudo dpkg -i *.deb
          sudo ldconfig
          
          echo "🔍 Checking libssc..."
          pkg-config --modversion libssc || true

      - name: Download source
        run: |
          wget https://gitlab.freedesktop.org/hadess/iio-sensor-proxy/-/archive/${PKGVERSION}/iio-sensor-proxy-${PKGVERSION}.tar.gz
          tar -xf iio-sensor-proxy-${PKGVERSION}.tar.gz

      - name: Build project
        run: |
          cd iio-sensor-proxy-${PKGVERSION}
          meson setup output \
            --prefix=/usr \
            -Db_lto=true \
            -Dssc-support=enabled \
            -Dsystemdsystemunitdir=/usr/lib/systemd/system

          meson compile -C output

      - name: Install into staging
        run: |
          cd iio-sensor-proxy-${PKGVERSION}
          DESTDIR=$PWD/stage meson install --no-rebuild -C output

      - name: Prepare DEB structure
        run: |
          mkdir -p deb/DEBIAN
          cp -r iio-sensor-proxy-${PKGVERSION}/stage/usr deb/

          cat > deb/DEBIAN/control <<EOF
          Package: ${PKGNAME}
          Version: 9999${PKGVERSION}-${PKGREL}
          Section: misc
          Priority: optional
          Architecture: arm64
          Maintainer: Dylan Van Assche <me@dylanvanassche.be>
          Depends: dbus, libglib2.0-0, libgudev-1.0-0, libpolkit-gobject-1-0
          Description: IIO sensors to D-Bus proxy (SSC patched)
           iio-sensor-proxy with Qualcomm SSC support patches.
          EOF

      - name: Build DEB
        run: |
          dpkg-deb --build deb
          mv deb.deb ${PKGNAME}_9999${PKGVERSION}-${PKGREL}_arm64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iio-sensor-proxy-ssc-patched
          path: "*.deb"

      - name: "Release"
        uses: softprops/action-gh-release@v1
        with:
          tag_name: iio_sensor_patched
          name: "iio_sensor_patched"
          draft: false
          prerelease: false
          files: "*.deb"
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}