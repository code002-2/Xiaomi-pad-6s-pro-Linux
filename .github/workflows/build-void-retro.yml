name: 🎮 Build Void Linux Retro Gaming

on:
  workflow_dispatch:
    inputs:
      skip_release:
        description: '跳过创建 GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="void-retro-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Void Retro Gaming OS - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🎮 Void Linux Retro Gaming OS (aarch64) For SM8550

            ---
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | 底层架构 | Void Linux ARM64 (glibc) |
            | 内核版本 | 7.1.0 |
            | 游戏前端 | **RetroArch** |
            | Init 系统 | **runit**  |

            ---
            ### 🔐 默认凭据
            - 普通用户: `luser` / 密码: `luser`
            - 管理员: `root` / 密码: `1234`
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-void-retro:
    name: Build Void Retro RootFS
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt update && sudo apt install -y p7zip-full curl wget android-sdk-libsparse-utils

      - name: Download kernel and sensor packages
        run: |
          gh release download "kernel-7.1.0" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true
          gh release download "sensor" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true
          gh release download "xiaomi-mipps-auth" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          chmod +x sheng-void-retro_build.sh
          sudo ./sheng-void-retro_build.sh 7.1.0

          SEVEN_Z_FILE=$(ls void_retro_*.7z | head -1)
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voidlinux-retro
          path: ${{ steps.build.outputs.path }}
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
