name: 🌀 Build Debian 13 Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.1)'
        required: true
        default: '7.1'
      boot_mode:
        description: '选择启动模式 (双启/单启)'
        required: true
        type: choice
        options:
          - all
          - dual
          - single
        default: 'all'
      desktop_env:
        description: '选择桌面环境 (GNOME/KDE)'
        required: true
        type: choice
        options:
          - all
          - gnome
          - kde
        default: 'all'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          DE_SUFFIX="${{ github.event.inputs.desktop_env || 'gnome' }}"
          TAG="debian13-${DE_SUFFIX}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Debian 13 Desktop (${{ github.event.inputs.desktop_env || 'all' }}) - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🌀 Debian 13 (Trixie) Desktop For SM8550
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | 架构 | ARM64 (arm64) |
            | 内核版本 | ${{ github.event.inputs.kernel_version || '7.1' }} |
            | 桌面环境 | ${{ github.event.inputs.desktop_env || 'all' }} |
            | 启动模式 | ${{ github.event.inputs.boot_mode || 'all' }} |
            
            ---
            
            ### 🔐 默认凭据
            - 普通用户: `luser` / 密码: `luser`
            - 管理员用户: `root` / 密码: `1234`
            
            ---
            
            ### 📦 镜像文件
            构建完成后将出现在下方附件中。解压后请直接使用 fastboot flash 刷入对应分区。
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-debian:
    name: Build Debian 13 Desktop
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      
      - name: "🔧 部署构建环境"
        run: |
          sudo apt update
          sudo apt install -y debootstrap libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils

      - name: Download kernel bundle
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.1"; fi
          
          gh release download "kernel-bundle-${KERNEL_VER}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true
          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          chmod +x sheng-rootfs_build.sh
          # 🚨 传入四个核心参数：系统版本、内核版本、启动模式、桌面环境
          sudo bash sheng-rootfs_build.sh debian-desktop "${{ github.event.inputs.kernel_version || '7.1' }}" "${{ github.event.inputs.boot_mode || 'all' }}" "${{ github.event.inputs.desktop_env || 'all' }}"
          
          # 统计到底生成了几个 7z 包
          PKG_COUNT=$(ls -1 *.7z 2>/dev/null | wc -l)
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-desktop-${{ github.event.inputs.desktop_env || 'all' }}
          # 直接用通配符捕获目录下所有的 .7z 文件
          path: "*.7z"
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release && steps.build.outputs.pkg_count > 0 }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}