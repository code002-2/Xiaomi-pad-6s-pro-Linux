name: 🌀 Build Debian 13 Desktop (Gnome)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="debian13-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Debian 13 Desktop - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🌀 Debian 13 (Trixie) Desktop Gnome For SM8550
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | 架构 | ARM64 (arm64) |
            | 内核版本 | ${{ github.event.inputs.kernel_version || '7.0' }} |
            | 桌面环境 | GNOME (task-gnome-desktop) |
            
            ---
            
            ### 🔐 默认凭据
            - 普通用户: `luser` / 密码: `luser`
            - 管理员用户: `root` / 密码: `1234`
            
            ---
            
            ### 📦 镜像文件
            构建完成后将出现在下方附件中。
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-debian:
    name: Build Debian 13 Desktop
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      
      - name: "🔧 部署构建环境"
        run: |
          sudo apt update
          sudo apt install -y debootstrap libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils

      - name: Download kernel bundle
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.0"; fi
          
          gh release download "kernel-bundle-${KERNEL_VER}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          chmod +x sheng-rootfs_build.sh
          # 传入你的参数执行构建
          sudo bash sheng-rootfs_build.sh debian-desktop "${{ github.event.inputs.kernel_version || '7.1' }}"
          
          # 🚨 核心修复 1：统计到底生成了几个 7z 包 (dual和single可能会生成两个)
          PKG_COUNT=$(ls -1 *.7z 2>/dev/null | wc -l)
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-desktop-gnome
          # 🚨 核心修复 2：直接用通配符捕获目录下所有的 .7z 文件，绝对不会抓空！
          path: "*.7z"
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release && steps.build.outputs.pkg_count > 0 }}
        uses: softprops/action-gh-release@v1
        with:
          # 确保这里用的 tag_name 在前面的步骤里生成好了
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
