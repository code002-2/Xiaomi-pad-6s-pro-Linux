name: Build Arch Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "内核版本号 (如: 7.0)"
        required: true
        default: "7.0"

jobs:
  build:
    name: "构建 Arch 内核 v${{ github.event.inputs.kernel_version || '7.0' }}"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: "📥 检出代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: "💾 设置ccache缓存"
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-arch-kernel-${{ github.event.inputs.kernel_version || '7.0' }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-arch-kernel-${{ github.event.inputs.kernel_version || '7.0' }}-
            ${{ runner.os }}-ccache-arch-kernel-

      - name: "🔧 设置构建环境"
        run: |
          echo "⚙️ 正在安装必要的构建工具..."
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev bc ccache clang llvm lld
          echo "✅ 构建工具安装完成"
          
          mkdir -p /home/runner/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros

      - name: "🔨 编译 Arch 优化内核"
        id: build
        run: |
          echo "🚀 开始编译内核版本 ${{ github.event.inputs.kernel_version || '7.0' }}"
          
          export CCACHE_DIR=/home/runner/.ccache
          export PATH="/usr/lib/ccache:$PATH"
          
          # 执行带有 rootwait 补丁的内核构建脚本
          chmod +x sheng-arch-kernel_build.sh
          bash sheng-arch-kernel_build.sh
          
          echo "✅ 内核编译完成"

      - name: "📦 收集编译产物"
        id: collect_artifacts
        run: |
          PKG_COUNT=$(ls -1 *.deb 2>/dev/null | wc -l)
          echo "📦 共找到 $PKG_COUNT 个包文件"
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: "📤 上传构建产物 (deb)"
        uses: actions/upload-artifact@v4
        with:
          name: arch-kernel-debs-${{ github.event.inputs.kernel_version || '7.0' }}
          path: "*.deb"
          retention-days: 7
          if-no-files-found: error

      - name: "📤 上传 boot.img"
        uses: actions/upload-artifact@v4
        with:
          name: boot_images
          path: |
            boot_sheng_singleboot.img
            boot_sheng_dualboot.img

      - name: "🏷️ 创建GitHub Release"
        if: steps.collect_artifacts.outputs.pkg_count > 0 && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: arch-kernel-${{ github.event.inputs.kernel_version || '7.0' }}
          name: "Arch Kernel ${{ github.event.inputs.kernel_version || '7.0' }}"
          body: |
            🧩 Arch Linux 专属内核 ${{ github.event.inputs.kernel_version || '7.0' }}
            
            ### 🔧 构建信息
            - 内核版本: ${{ github.event.inputs.kernel_version || '7.0' }}
            - 挂载特性: 已注入 `rootwait rw` 防线 (解决挂载重启黑屏)
            
            ### 📦 包含文件
            - `linux-xiaomi-sheng.deb` (含模块与基础内核)
            - `firmware-xiaomi-sheng.deb`
            - `alsa-xiaomi-sheng.deb`
            - `boot_sheng_dualboot.img`
            - `boot_sheng_singleboot.img`
          draft: false
          prerelease: false
          files: |
            *.deb
            *.img
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
