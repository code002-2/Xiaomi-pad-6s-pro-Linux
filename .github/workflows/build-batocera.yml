name: 🎮 Build Batocera (Debian-Style Sparse Image)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本号'
        required: true
        default: '7.1'
  push:
    paths:
      - 'sheng-batocera_build.sh'

jobs:
  build:
    name: Compile & Pack Batocera
    runs-on: ubuntu-24.04
    steps:
      - name: "🧹 释放服务器空间"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force

      - name: "📦 安装 Buildroot 与打包依赖"
        run: |
          sudo apt update
          sudo apt install -y build-essential git wget python3 unzip bzip2 cpio rsync bc libncurses5-dev libncursesw5-dev android-sdk-libsparse-utils p7zip-full libarchive-tools

      - name: "📥 检出你仓库的代码 (获取打包脚本)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "📥 克隆官方 Batocera 源码"
        run: |
          git clone --depth 1 https://github.com/batocera-linux/batocera.linux.git batocera

      - name: "⚙️ 注入 Batocera 配置"
        run: |
          mkdir -p batocera/configs
          cat << 'EOF' > batocera/configs/batocera-xiaomi-sheng_defconfig
          BR2_aarch64=y
          BR2_cortex_a710=y
          BR2_LINUX_KERNEL=y
          BR2_LINUX_KERNEL_USE_ARCH_DEFAULT_CONFIG=y
          BR2_PACKAGE_MESA3D=y
          BR2_PACKAGE_MESA3D_GALLIUM_DRIVER_FREEDRENO=y
          BR2_PACKAGE_MESA3D_VULKAN_DRIVER_FREEDRENO=y
          BR2_TARGET_ROOTFS_EXT2=n
          BR2_TARGET_ROOTFS_SQUASHFS=y
          BR2_TARGET_ROOTFS_CPIO=y
          BR2_TARGET_ROOTFS_CPIO_GZIP=y
          EOF
          echo "✅ 配置文件已成功写入到 batocera/configs/batocera-xiaomi-sheng_defconfig"

      - name: "🔥 第一阶段：仅编译 Batocera RootFS"
        run: |
          cd batocera
          make batocera-xiaomi-sheng_defconfig
          make -j$(nproc)

      - name: "📥 第二阶段：同仓库极速拉取内核包"
        run: |
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version }}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true
            
          mkdir -p kernel_ext
          for deb in *.deb; do
            dpkg-deb -x "$deb" kernel_ext/ || true
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🗜️ 第三阶段：运行组装脚本"
        run: |
          # 提取编译好的系统包
          mkdir -p output/images
          cp batocera/output/images/rootfs.squashfs output/images/
          cp batocera/output/images/rootfs.cpio.gz output/images/
          
          # 防呆处理：如果脚本被加上了.txt后缀，自动去掉
          mv sheng-batocera_build.sh.txt sheng-batocera_build.sh 2>/dev/null || true
          
          chmod +x sheng-batocera_build.sh
          sudo bash sheng-batocera_build.sh

      - name: "📤 上传 Batocera 刷机包"
        uses: actions/upload-artifact@v4
        with:
          name: batocera-sheng-sparse-image
          path: "*.7z"
          retention-days: 7
