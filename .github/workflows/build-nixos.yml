# ---
# Module: RootFS Build Workflow
# Description: GitHub Actions workflow to build NixOS rootfs + boot image
# Scope: CI
# ---

name: Build NixOS RootFS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      boot_mode:
        description: 'Boot mode (dual/single/all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - dual
          - single
      image_size:
        description: "RootFS image size, or auto for computed full ext4 size"
        required: true
        default: "auto"
      rootfs_flake_attr:
        description: "RootFS flake output to build"
        required: true
        type: choice
        options:
          - mobileRootfsImage
        default: "mobileRootfsImage"
      skip_release:
        description: "Skip GitHub release"
        type: boolean
        default: true
      username:
        description: "Default non-root username"
        required: false
        default: "luser"
      user_password:
        description: "Password for the non-root user"
        required: false
        default: "1"
      root_password:
        description: "Password for the root user"
        required: false
        default: "123456"

jobs:
  build:
    name: Build NixOS rootfs + boot image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt update
          sudo apt install -y e2fsprogs gh xz-utils zstd

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          install_url: https://nixos.org/nix/install
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://nix-community.cachix.org https://sheng-nixos.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dNimDSK38dlRG8QZwyUKiBlbWPixHpmMo= sheng-nixos.cachix.org-1:JWMDgm5bCsCKpsq/vx6mgDMeLiQ5g9vLEhqCy2EMKJk=

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Update flake lock (drivers/firmware only, kernel pinned)
        run: |
          nix flake lock --update-input shengFirmware --update-input shengFingerprint --update-input shengThp --update-input shengPenStatus --update-input shengAlsaUcm
        working-directory: nixos

      - name: Fast validate (eval only, no build)
        run: |
          nix --extra-experimental-features "nix-command flakes" \
            eval "./nixos#nixosConfigurations.sheng.config.system.build.toplevel.drvPath" \
            --fallback
        working-directory: nixos

      - name: Validate stage-2 configuration
        run: |
          nix --extra-experimental-features "nix-command flakes" \
            build "./nixos#nixosConfigurations.sheng.config.system.build.toplevel" \
            --no-link \
            --fallback

      - name: Build image
        run: |
          chmod +x build-nixos-rootfs.sh
          sudo env "PATH=$PATH" "NIX_PATH=$NIX_PATH" \
            BOOT_MODE="${{ github.event.inputs.boot_mode || 'all' }}" \
            IMAGE_SIZE="${{ github.event.inputs.image_size || '8G' }}" \
            ROOTFS_FLAKE_ATTR="${{ github.event.inputs.rootfs_flake_attr || 'mobileRootfsImage' }}" \
            USER_NAME="${{ github.event.inputs.username || 'luser' }}" \
            USER_PASS="${{ github.event.inputs.user_password || '1' }}" \
            ROOT_PASS="${{ github.event.inputs.root_password || '123456' }}" \
            ./build-nixos-rootfs.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixos-sheng-rootfs-${{ github.event.inputs.rootfs_flake_attr || 'mobileRootfsImage' }}
          path: |
            out/nixos-sheng-*.img
            out/boot_sheng_*.img
          retention-days: 14

      - name: Create release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nixos-rootfs-${{ github.run_number }}
          name: "NixOS Sheng RootFS #${{ github.run_number }}"
          files: |
            out/nixos-sheng-*.img
            out/boot_sheng_*.img
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
