name: 🌀 Build Debian 14

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本号 (例如 7.1.0)'
        required: true
        type: string
        default: '7.1.0'
      variant:
        description: '选择构建类型'
        required: true
        type: choice
        options:
          - desktop
          - server
        default: 'desktop'
      desktop_env:
        description: '选择桌面环境 (仅 desktop 类型)'
        type: choice
        options:
          - all
          - gnome
          - kde
        default: 'all'
      boot_mode:
        description: '选择启动模式'
        required: true
        type: choice
        options:
          - all
          - dual
          - single
        default: 'all'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      variant: ${{ steps.tag.outputs.variant }}
      matrix_desktop: ${{ steps.set-matrix.outputs.desktop }}
      matrix_boot: ${{ steps.set-matrix.outputs.boot }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          VARIANT="${{ github.event.inputs.variant || 'desktop' }}"
          TAG="debian14-${VARIANT}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          echo "variant=$VARIANT" >> $GITHUB_OUTPUT

      - name: 🧮 Generate Dynamic Matrix
        id: set-matrix
        run: |
          VARIANT="${{ github.event.inputs.variant || 'desktop' }}"
          if [ "$VARIANT" == "server" ]; then
            echo 'desktop=["server"]' >> $GITHUB_OUTPUT
          else
            DESKTOP="${{ github.event.inputs.desktop_env || 'all' }}"
            if [ "$DESKTOP" == "all" ]; then
              echo 'desktop=["gnome", "kde"]' >> $GITHUB_OUTPUT
            else
              echo "desktop=[\"$DESKTOP\"]" >> $GITHUB_OUTPUT
            fi
          fi

          BOOT="${{ github.event.inputs.boot_mode || 'all' }}"
          if [ "$BOOT" == "all" ]; then
            echo 'boot=["dual", "single"]' >> $GITHUB_OUTPUT
          else
            echo "boot=[\"$BOOT\"]" >> $GITHUB_OUTPUT
          fi

  build-debian:
    name: Build (${{ matrix.desktop }} | ${{ matrix.boot }})
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        desktop: ${{ fromJSON(needs.prepare-release.outputs.matrix_desktop) }}
        boot: ${{ fromJSON(needs.prepare-release.outputs.matrix_boot) }}

    steps:
      - uses: actions/checkout@v4

      - name: "🔧 部署构建环境"
        run: |
          sudo apt update
          sudo apt install -y debootstrap libarchive-tools zstd curl wget android-sdk-libsparse-utils

      - name: Download kernel and sensor packages
        run: |
          echo "::group::Download kernel packages (kernel-${{ github.event.inputs.kernel_version }})"
          if gh release view "kernel-${{ github.event.inputs.kernel_version }}" --repo "${{ github.repository }}" &>/dev/null; then
            gh release download "kernel-${{ github.event.inputs.kernel_version }}" \
              --pattern "*.deb" --repo "${{ github.repository }}" --clobber
            echo "✅ kernel packages downloaded"
          else
            echo "❌ ERROR: Release 'kernel-${{ github.event.inputs.kernel_version }}' not found!"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Download sensor packages (ppd-arm-sync)"
          if gh release view "ppd-arm-sync" --repo "${{ github.repository }}" &>/dev/null; then
            gh release download "ppd-arm-sync" \
              --pattern "*.deb" --repo "${{ github.repository }}" --clobber
            echo "✅ sensor packages downloaded"
          else
            echo "❌ ERROR: Release 'ppd-arm-sync' not found!"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Download auth packages (xiaomi-mipps-auth)"
          if gh release view "xiaomi-mipps-auth" --repo "${{ github.repository }}" &>/dev/null; then
            gh release download "xiaomi-mipps-auth" \
              --pattern "*.deb" --repo "${{ github.repository }}" --clobber
            echo "✅ auth packages downloaded"
          else
            echo "❌ ERROR: Release 'xiaomi-mipps-auth' not found!"
            exit 1
          fi
          echo "::endgroup::"

          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          chmod +x debian-sheng-rootfs-build.sh
          if [ "${{ matrix.desktop }}" == "server" ]; then
            sudo bash debian-sheng-rootfs-build.sh debian-server "${{ github.event.inputs.kernel_version }}" "${{ matrix.boot }}"
          else
            sudo bash debian-sheng-rootfs-build.sh debian-desktop "${{ github.event.inputs.kernel_version }}" "${{ matrix.boot }}" "${{ matrix.desktop }}"
          fi

          PKG_COUNT=$(ls -1 *.zst 2>/dev/null | wc -l)
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-${{ matrix.desktop }}-${{ matrix.boot }}
          path: "*.zst"
          retention-days: 7

      - name: Upload to Release
        if: ${{ github.event.inputs.skip_release != 'true' && steps.build.outputs.pkg_count > 0 }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: "Debian 14 (${{ needs.prepare-release.outputs.variant }})"
          body: |
            ### 📋 系统信息
            | 项目 | 详情 |
            |------|------|
            | 系统 | Debian 14 (Forky) |
            | 内核版本 | ${{ github.event.inputs.kernel_version }} |
            | 类型 | ${{ needs.prepare-release.outputs.variant }} |

            ### 🔐 默认凭据
            - 用户名: `xiaomi` / 密码: `xiaomi`
          files: "*.zst"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
