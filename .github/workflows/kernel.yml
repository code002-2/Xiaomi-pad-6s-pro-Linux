name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本号 (例如 7.1.0)'
        required: true
        type: string
        default: '7.1.0'

jobs:
  build:
    name: "构建内核 v${{ github.event.inputs.kernel_version }}"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: "📥 检出代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: "💾 设置 ccache 编译缓存"
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-unified-kernel-${{ github.event.inputs.kernel_version }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-unified-kernel-${{ github.event.inputs.kernel_version }}-
            ${{ runner.os }}-ccache-unified-kernel-
          save-always: true

      - name: "🔧 部署 LLVM 交叉编译环境"
        run: |
          echo "⚙️ 正在安装必要的构建工具..."
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev bc ccache clang llvm lld wget xz-utils unzip autoconf automake libtool libyaml-dev libbsd-dev ninja-build pkg-config python3 python3-pip libglib2.0-dev libprotobuf-c-dev libqmi-glib-dev libmbim-glib-dev libgudev-1.0-dev libpolkit-gobject-1-dev libsystemd-dev libdbus-1-dev protobuf-compiler protobuf-c-compiler

          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user "meson>=1.4.0"
          # 确保优先使用 pip 安装的 meson
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"

          echo "✅ 构建工具安装完成"

          mkdir -p /home/runner/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros
          ccache --set-config=hash_dir=false

      - name: "🔨 编译内核"
        id: build
        env:
          KERNEL_VERSION: ${{ github.event.inputs.kernel_version }}
        run: |
          echo "🚀 开始编译内核版本 ${{ github.event.inputs.kernel_version }}"

          export CCACHE_DIR=/home/runner/.ccache
          export CCACHE_MAXSIZE=10G

          # ==========================================
          # 所有的卡死修复和报错剔除都已经写在脚本里了
          # 这里直接无脑运行即可！
          # ==========================================
          chmod +x sheng-kernel_build.sh
          bash sheng-kernel_build.sh "${{ github.event.inputs.kernel_version }}"

          echo "✅ 内核编译完成"
          ccache --show-stats || true

      - name: "📦 收集并统计编译产物"
        id: collect_artifacts
        run: |
          PKG_COUNT=$(ls -1 *.deb 2>/dev/null | wc -l)
          echo "📦 共找到 $PKG_COUNT 个 Debian 包文件"
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: "📤 上传生成的配置文件"
        uses: actions/upload-artifact@v4
        with:
          name: generated-config
          path: sm8550.config

      - name: "📤 上传系统驱动包 (.deb)"
        uses: actions/upload-artifact@v4
        with:
          name: unified-kernel-debs-${{ github.event.inputs.kernel_version }}
          path: "*.deb"
          retention-days: 7
          if-no-files-found: error

      - name: "📤 上传启动镜像 (boot.img)"
        uses: actions/upload-artifact@v4
        with:
          name: boot_images
          path: |
            boot_sheng_singleboot.img
            boot_sheng_dualboot.img

      - name: "🏷️ 自动发布 GitHub Release"
        if: steps.collect_artifacts.outputs.pkg_count > 0 && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel-${{ github.event.inputs.kernel_version }}
          name: "Kernel v${{ github.event.inputs.kernel_version }}"
          body: |
            **小米Pad6spro通用内核 v${{ github.event.inputs.kernel_version }}**

          draft: false
          prerelease: false
          files: |
            *.deb
            *.img
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
