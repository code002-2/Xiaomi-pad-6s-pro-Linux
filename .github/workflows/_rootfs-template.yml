name: RootFS Build Template

on:
  workflow_call:
    inputs:
      distro:
        description: 'Distro identifier passed to script'
        required: true
        type: string
      script:
        description: 'Rootfs build script to run'
        required: true
        type: string
      kernel_version_default:
        description: 'Default kernel version'
        required: true
        type: string
      kernel_channel_default:
        description: 'Default kernel channel (mainline/stable)'
        required: false
        type: string
        default: 'mainline'
      desktop_matrix:
        description: 'Desktop environment matrix (JSON array)'
        required: false
        type: string
        default: '["all"]'
      boot_matrix:
        description: 'Boot mode matrix (JSON array)'
        required: false
        type: string
        default: '["all"]'
      release_tag_prefix:
        description: 'Prefix for release tag'
        required: true
        type: string
      release_body_title:
        description: 'Title for release body'
        required: false
        type: string
        default: ''
      skip_release:
        description: 'Skip creating GitHub Release'
        required: false
        type: boolean
        default: false

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="${{ inputs.release_tag_prefix }}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (early)
        if: ${{ !inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "${{ inputs.release_body_title || inputs.release_tag_prefix }} - ${{ steps.tag.outputs.release_tag }}"
          body: |
            **${{ inputs.release_body_title || inputs.release_tag_prefix }}**

            | 项目 | 详情 |
            |------|------|
            | 发行版 | ${{ inputs.release_tag_prefix }} |
            | 内核版本 | ${{ github.event.inputs.kernel_version || inputs.kernel_version_default }} |
            | 内核通道 | ${{ github.event.inputs.kernel_channel || inputs.kernel_channel_default }} |
            | 构建SHA | [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
            | 桌面环境 | ${{ github.event.inputs.desktop_env || 'all' }} |
            | 启动模式 | ${{ github.event.inputs.boot_mode || 'all' }} |
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        desktop: ${{ fromJSON(inputs.desktop_matrix) }}
        boot: ${{ fromJSON(inputs.boot_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ inputs.release_tag_prefix }}-${{ hashFiles('.github/workflows/_rootfs-template.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-${{ inputs.release_tag_prefix }}-
            ${{ runner.os }}-apt-

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y debootstrap libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils

      - name: Download kernel bundle
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version || inputs.kernel_version_default }}"
          KERNEL_CHANNEL="${{ github.event.inputs.kernel_channel || inputs.kernel_channel_default }}"
          echo "Downloading kernel bundle for channel=${KERNEL_CHANNEL} version=${KERNEL_VER}"
          gh release download "kernel-bundle-${KERNEL_VER}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version || inputs.kernel_version_default }}"
          KERNEL_CHANNEL="${{ github.event.inputs.kernel_channel || inputs.kernel_channel_default }}"
          BOOT_MODE="${{ github.event.inputs.boot_mode || 'all' }}"
          DESKTOP_ENV="${{ github.event.inputs.desktop_env || 'all' }}"
          chmod +x ${{ inputs.script }}
          sudo KERNEL_CHANNEL="$KERNEL_CHANNEL" bash ${{ inputs.script }} ${{ inputs.distro }} "$KERNEL_VER" \
            "$BOOT_MODE" "$DESKTOP_ENV"
          echo "pkg_count=$(ls -1 *.7z 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_tag_prefix }}-${{ matrix.desktop }}-${{ matrix.boot }}
          path: "*.7z"
          retention-days: 7

      - name: Upload to Release
        if: ${{ !inputs.skip_release && steps.build.outputs.pkg_count > 0 }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release:
    name: "更新 Release 信息"
    runs-on: ubuntu-24.04-arm
    needs: [prepare-release, build]
    permissions:
      contents: write
    if: ${{ !inputs.skip_release }}
    steps:
      - name: 更新 Release 描述
        run: |
          TAG="${{ needs.prepare-release.outputs.release_tag }}"
          echo "📝 更新 Release $TAG ..."

          # 获取该 release 的所有资产
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || echo "")

          BODY=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || echo "")

          # 追加资产列表
          if [ -n "$ASSETS" ]; then
            echo "" >> /tmp/assets.md
            echo "### 📦 构建产物" >> /tmp/assets.md
            echo "" >> /tmp/assets.md
            while IFS= read -r asset; do
              if [ -n "$asset" ]; then
                SIZE=$(gh release view "$TAG" --json assets --jq ".assets[] | select(.name==\"$asset\") | .sizeBytes" 2>/dev/null || echo "?")
                if [ "$SIZE" != "?" ] && [ "$SIZE" -gt 0 ] 2>/dev/null; then
                  HUMAN_SIZE=$((SIZE / 1024 / 1024))
                  echo "- \`$asset\` (~${HUMAN_SIZE}MB)" >> /tmp/assets.md
                else
                  echo "- \`$asset\`" >> /tmp/assets.md
                fi
              fi
            done <<< "$ASSETS"
          fi

          # 追加到 body
          if [ -s /tmp/assets.md ]; then
            cat /tmp/assets.md >> /tmp/new_body.md
            echo "" >> /tmp/new_body.md
          fi
          echo "---" >> /tmp/new_body.md
          echo "**构建时间**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> /tmp/new_body.md

          gh release edit "$TAG" --body-file /tmp/new_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
