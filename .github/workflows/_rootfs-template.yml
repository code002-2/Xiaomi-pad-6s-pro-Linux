name: RootFS Build Template

on:
  workflow_call:
    inputs:
      distro:
        description: 'Distro identifier passed to script'
        required: true
        type: string
      script:
        description: 'Rootfs build script to run'
        required: true
        type: string
      kernel_version_default:
        description: 'Default kernel version'
        required: true
        type: string
      kernel_channel_default:
        description: 'Default kernel channel (mainline/stable)'
        required: false
        type: string
        default: 'mainline'
      kernel_channel:
        description: 'Kernel channel from user input (overrides default)'
        required: false
        type: string
        default: ''
      desktop_env:
        description: 'Desktop environment from user input (overrides matrix default)'
        required: false
        type: string
        default: ''
      boot_mode:
        description: 'Boot mode from user input (overrides matrix default)'
        required: false
        type: string
        default: ''
      desktop_matrix:
        description: 'Desktop environment matrix (JSON array)'
        required: false
        type: string
        default: '["all"]'
      boot_matrix:
        description: 'Boot mode matrix (JSON array)'
        required: false
        type: string
        default: '["all"]'
      release_tag_prefix:
        description: 'Prefix for release tag'
        required: true
        type: string
      release_body_title:
        description: 'Title for release body'
        required: false
        type: string
        default: ''
      skip_release:
        description: 'Skip creating GitHub Release'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ inputs.release_tag_prefix }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        desktop: ${{ fromJSON(inputs.desktop_matrix) }}
        boot: ${{ fromJSON(inputs.boot_matrix) }}
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      build_success: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate release tag
        id: tag
        run: |
          TAG="${{ inputs.release_tag_prefix }}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ inputs.release_tag_prefix }}-${{ hashFiles('.github/workflows/_rootfs-template.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-${{ inputs.release_tag_prefix }}-
            ${{ runner.os }}-apt-

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y debootstrap libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils

      - name: Download kernel bundle
        run: |
          KERNEL_VER="${{ inputs.kernel_version_default }}"
          KERNEL_CHANNEL="${{ inputs.kernel_channel || inputs.kernel_channel_default }}"
          echo "Downloading kernel bundle for channel=${KERNEL_CHANNEL} version=${KERNEL_VER}"

          # Verify the kernel bundle release exists before attempting download
          if ! gh release view "kernel-bundle-${KERNEL_CHANNEL}-${KERNEL_VER}" \
              --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "错误: 内核 Bundle 发布 'kernel-bundle-${KERNEL_CHANNEL}-${KERNEL_VER}' 不存在！" >&2
            echo "请先通过 'Build Kernel' + 'Build Kernel Bundle' workflow 构建内核。" >&2
            exit 1
          fi

          gh release download "kernel-bundle-${KERNEL_CHANNEL}-${KERNEL_VER}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          KERNEL_VER="${{ inputs.kernel_version_default }}"
          KERNEL_CHANNEL="${{ inputs.kernel_channel || inputs.kernel_channel_default }}"
          BOOT_MODE="${{ inputs.boot_mode || 'all' }}"
          DESKTOP_ENV="${{ inputs.desktop_env || 'all' }}"
          chmod +x ${{ inputs.script }}
          sudo KERNEL_CHANNEL="$KERNEL_CHANNEL" bash ${{ inputs.script }} ${{ inputs.distro }} "$KERNEL_VER" \
            "$BOOT_MODE" "$DESKTOP_ENV"
          echo "pkg_count=$(ls -1 *.7z 2>/dev/null | wc -l)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_tag_prefix }}-${{ matrix.desktop }}-${{ matrix.boot }}
          path: "*.7z"
          retention-days: 7
          if-no-files-found: error

  create-release:
    name: "创建 Release"
    runs-on: ubuntu-24.04-arm
    needs: [build]
    permissions:
      contents: write
    if: ${{ !inputs.skip_release && needs.build.result == 'success' }}
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: "${{ inputs.release_body_title || inputs.release_tag_prefix }} - ${{ needs.build.outputs.release_tag }}"
          body: |
            **${{ inputs.release_body_title || inputs.release_tag_prefix }}**

            | 项目 | 详情 |
            |------|------|
            | 发行版 | ${{ inputs.release_tag_prefix }} |
            | 内核版本 | ${{ inputs.kernel_version_default }} |
            | 内核通道 | ${{ inputs.kernel_channel || inputs.kernel_channel_default }} |
            | 构建SHA | [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
            | 桌面环境 | ${{ inputs.desktop_matrix }} |
            | 启动模式 | ${{ inputs.boot_matrix }} |
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.release_tag_prefix }}-*
          merge-multiple: true

      - name: Upload assets to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build asset list and finalize Release
        run: |
          TAG="${{ needs.build.outputs.release_tag }}"

          # Build asset list
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || echo "")

          echo "" > /tmp/release_body.md
          echo "### Built artifacts" >> /tmp/release_body.md
          echo "" >> /tmp/release_body.md

          if [ -n "$ASSETS" ]; then
            while IFS= read -r asset; do
              if [ -n "$asset" ]; then
                SIZE=$(gh release view "$TAG" --json assets --jq ".assets[] | select(.name==\"$asset\") | .sizeBytes" 2>/dev/null || echo "?")
                if [ "$SIZE" != "?" ] && [ "$SIZE" -gt 0 ] 2>/dev/null; then
                  HUMAN_SIZE=$((SIZE / 1024 / 1024))
                  echo "- \`$asset\` (~${HUMAN_SIZE}MB)" >> /tmp/release_body.md
                else
                  echo "- \`$asset\`" >> /tmp/release_body.md
                fi
              fi
            done <<< "$ASSETS"
          fi

          echo "" >> /tmp/release_body.md
          echo "---" >> /tmp/release_body.md
          echo "**Built at**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> /tmp/release_body.md

          # Append to existing body — fetch and prepend
          EXISTING_BODY=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || echo "")
          if [ -n "$EXISTING_BODY" ]; then
            printf '%s\n\n%s' "$EXISTING_BODY" "$(cat /tmp/release_body.md)" > /tmp/combined_body.md
            gh release edit "$TAG" --body-file /tmp/combined_body.md
          else
            gh release edit "$TAG" --body-file /tmp/release_body.md
          fi

          # Publish the draft
          gh release edit "$TAG" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
