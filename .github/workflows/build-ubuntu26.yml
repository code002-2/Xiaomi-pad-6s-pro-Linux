name: 🐧 Build Ubuntu 26.04 Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Ubuntu 26.04 Desktop (${{ matrix.desktop_env }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        desktop_env: [gnome]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      # [关键补丁] 修复 debootstrap command not found 错误
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y debootstrap p7zip-full curl qemu-user-static binfmt-support

      - name: Build RootFS
        run: |
          chmod +x build-ubuntu26-rootfs.sh
          # 执行构建脚本
          sudo bash -x ./build-ubuntu26-rootfs.sh ${{ github.event.inputs.kernel_version }} ${{ matrix.desktop_env }}
          
          # 验证文件是否生成
          if [ -z "$(ls ubuntu26_${{ matrix.desktop_env }}_*.7z 2>/dev/null)" ]; then
            echo "错误: 未找到生成的 .7z 镜像文件"
            ls -lh
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu26-${{ matrix.desktop_env }}
          # 使用通配符完美匹配带时间戳的文件名
          path: ubuntu26_${{ matrix.desktop_env }}_*.7z
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          files: ubuntu26_${{ matrix.desktop_env }}_*.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
