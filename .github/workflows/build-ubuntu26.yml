name: 🐧 Build Ubuntu 26.04 (Desktop/Server)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本号 (例如 7.1.0)'
        required: true
        type: string
        default: '7.1.0'
      variant:
        description: '选择构建类型'
        required: true
        type: choice
        options:
          - desktop
          - server
        default: 'desktop'
      desktop_env:
        description: '选择桌面环境 (仅 desktop 类型)'
        type: choice
        options:
          - all
          - gnome
          - kde
          - xfce
        default: 'all'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      variant: ${{ steps.tag.outputs.variant }}
      matrix_desktop: ${{ steps.set-matrix.outputs.desktop }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          VARIANT="${{ github.event.inputs.variant || 'desktop' }}"
          TAG="ubuntu26-${VARIANT}-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          echo "variant=$VARIANT" >> $GITHUB_OUTPUT

      - name: 🧮 Generate Dynamic Matrix
        id: set-matrix
        run: |
          VARIANT="${{ github.event.inputs.variant || 'desktop' }}"
          if [ "$VARIANT" == "server" ]; then
            echo 'desktop=["server"]' >> $GITHUB_OUTPUT
          else
            DESKTOP="${{ github.event.inputs.desktop_env || 'all' }}"
            if [ "$DESKTOP" == "all" ]; then
              echo 'desktop=["gnome", "kde", "xfce"]' >> $GITHUB_OUTPUT
            else
              echo "desktop=[\"$DESKTOP\"]" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    name: Build Ubuntu 26.04 (${{ matrix.desktop }})
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        desktop: ${{ fromJSON(needs.prepare-release.outputs.matrix_desktop) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap libarchive-tools zstd curl wget android-sdk-libsparse-utils

      - name: Download kernel and sensor packages
        run: |
          echo "::group::Download kernel packages (kernel-${{ github.event.inputs.kernel_version }})"
          if gh release view "kernel-${{ github.event.inputs.kernel_version }}" --repo "${{ github.repository }}" &>/dev/null; then
            gh release download "kernel-${{ github.event.inputs.kernel_version }}" \
              --pattern "*.deb" --repo "${{ github.repository }}" --clobber
            echo "✅ kernel packages downloaded"
          else
            echo "❌ ERROR: Release 'kernel-${{ github.event.inputs.kernel_version }}' not found!"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Download sensor packages (ppd-arm-sync)"
          if gh release view "ppd-arm-sync" --repo "${{ github.repository }}" &>/dev/null; then
            gh release download "ppd-arm-sync" \
              --pattern "*.deb" --repo "${{ github.repository }}" --clobber
            echo "✅ sensor packages downloaded"
          else
            echo "❌ ERROR: Release 'ppd-arm-sync' not found!"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Download auth packages (xiaomi-mipps-auth)"
          if gh release view "xiaomi-mipps-auth" --repo "${{ github.repository }}" &>/dev/null; then
            gh release download "xiaomi-mipps-auth" \
              --pattern "*.deb" --repo "${{ github.repository }}" --clobber
            echo "✅ auth packages downloaded"
          else
            echo "❌ ERROR: Release 'xiaomi-mipps-auth' not found!"
            exit 1
          fi
          echo "::endgroup::"

          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          echo "::group::🔨 Build RootFS"
          echo "  Kernel version : ${{ github.event.inputs.kernel_version }}"
          echo "  Desktop        : ${{ matrix.desktop }}"

          chmod +x build-ubuntu26-rootfs.sh
          sudo ./build-ubuntu26-rootfs.sh ${{ github.event.inputs.kernel_version }} ${{ matrix.desktop }}
          echo "::endgroup::"

          echo "::group::📦 Build artifacts"
          ZST_FILE=$(ls ubuntu26_${{ matrix.desktop }}_*.zst 2>/dev/null | head -1)
          if [ -n "$ZST_FILE" ]; then
            echo "✅ Image built:"
            ls -lh "$ZST_FILE"
          else
            echo "❌ ERROR: No .zst image found!"
            exit 1
          fi
          echo "filename=$(basename "$ZST_FILE")" >> $GITHUB_OUTPUT
          echo "path=$ZST_FILE" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu26-${{ matrix.desktop }}
          path: ${{ steps.build.outputs.path }}
          retention-days: 7

      - name: Upload to Release
        if: ${{ github.event.inputs.skip_release != 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: "Ubuntu 26.04 (${{ needs.prepare-release.outputs.variant }})"
          body: |
            ### 📋 系统信息
            | 项目 | 详情 |
            |------|------|
            | 系统 | Ubuntu 26.04 LTS (Resolute) |
            | 内核版本 | ${{ github.event.inputs.kernel_version }} |
            | 类型 | ${{ needs.prepare-release.outputs.variant }} |

            ### 🔐 默认凭据
            - 用户名: `xiaomi` / 密码: `xiaomi`
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
