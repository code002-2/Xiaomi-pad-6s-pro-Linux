name: 🐧 Build Ubuntu 26.04 Desktop
on: [workflow_dispatch, push]
jobs:
  build-desktop:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        desktop_env: [gnome]
    steps:
      - uses: actions/checkout@v4
      - name: Build RootFS
        run: |
          chmod +x build-ubuntu26-rootfs.sh
          sudo bash -x ./build-ubuntu26-rootfs.sh 7.0 ${{ matrix.desktop_env }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu26-${{ matrix.desktop_env }}
          path: ubuntu26_${{ matrix.desktop_env }}_*.7z
          retention-days: 7
