name: Build Ubuntu 26.04 Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - 'build-ubuntu26-rootfs.sh'
      - 'lib/rootfs-common.sh'
      - '.github/workflows/build-ubuntu26.yml'
      - '.github/workflows/_rootfs-template.yml'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_rootfs-template.yml
    with:
      distro: ubuntu
      script: build-ubuntu26-rootfs.sh
      kernel_version_default: '7.0'
      desktop_matrix: '["gnome", "kde", "xfce"]'
      release_tag_prefix: ubuntu26
      release_body_title: "Ubuntu 26.04 Desktop"
      skip_release: ${{ github.event.inputs.skip_release }}
    secrets: inherit
