name: 🐧 Build Ubuntu 26.04 Desktop (GNOME/KDE/Xfce)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="ubuntu26-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Ubuntu 26.04 Desktop - ${{ steps.tag.outputs.release_tag }}"
          body: "自动化构建的 Ubuntu 26.04 RootFS 镜像。"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: Build Ubuntu 26.04 Desktop (${{ matrix.desktop_env }})
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    strategy:
      matrix:
        desktop_env: [gnome, kde, xfce]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap p7zip-full curl

      - name: Download kernel bundle
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          [ -z "$KERNEL_VER" ] && KERNEL_VER="7.0"
          gh release download "kernel-bundle-${KERNEL_VER}" --pattern "*.deb" --repo "${{ github.repository }}" --clobber || echo "警告: 未找到内核包"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          [ -z "$KERNEL_VER" ] && KERNEL_VER="7.0"
          
          chmod +x build-ubuntu26-rootfs.sh
          # 执行构建，开启详细日志以备排查
          sudo bash -x ./build-ubuntu26-rootfs.sh ${KERNEL_VER} ${{ matrix.desktop_env }}
          
          # 验证文件是否存在 (根据构建逻辑，文件名应为 ubuntu26_gnome.7z 等)
          TARGET_FILE="ubuntu26_${{ matrix.desktop_env }}.7z"
          if [ ! -f "$TARGET_FILE" ]; then
            echo "错误: 找不到生成的镜像文件: $TARGET_FILE"
            ls -lh  # 打印当前目录内容辅助调试
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu26-${{ matrix.desktop_env }}
          path: ubuntu26_${{ matrix.desktop_env }}.7z
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ubuntu26_${{ matrix.desktop_env }}.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
