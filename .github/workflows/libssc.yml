name: Build libssc DEB (ARM64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    env:
      PKGVERSION: 0.3.0
      PKGREL: 1

    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential ninja-build git pkg-config \
            python3-pip libglib2.0-dev libprotobuf-c-dev \
            libqmi-glib-dev libmbim-glib-dev \
            linux-libc-dev protobuf-compiler protobuf-c-compiler
          pip3 install --upgrade meson

      - name: Clone source repository
        run: |
          git clone https://codeberg.org/DylanVanAssche/libssc.git source

      - name: Apply patch
        run: |
          cd source
          wget -O wait_for_qmi_service.patch \
            https://raw.githubusercontent.com/alghiffaryfa19/sheng-sensors-patch/refs/heads/main/libssc-git/wait_for_qmi_service.patch
          patch -Np1 < wait_for_qmi_service.patch || true

      - name: Build libssc
        run: |
          cd source
          meson setup build --prefix=/usr
          meson compile -C build
          DESTDIR=$PWD/stage meson install -C build

      - name: Package libssc
        run: |
          mkdir -p deb/DEBIAN deb/usr
          cp -r source/stage/usr/* deb/usr/
          cat > deb/DEBIAN/control <<EOF
          Package: libssc
          Version: ${PKGVERSION}-${PKGREL}
          Section: libs
          Priority: optional
          Architecture: arm64
          Maintainer: Xiaomi Pad 6s Pro Linux Port <github@code002-2>
          Depends: libglib2.0-0, libprotobuf-c1, libqmi-glib5
          Description: Library to expose Qualcomm Sensor Core sensors
           libssc userspace library for Qualcomm SSC.
          EOF
          find deb -type d -exec chmod 755 {} \;
          find deb -type f -exec chmod 644 {} \;
          dpkg-deb --build deb
          mv deb.deb libssc_${PKGVERSION}-${PKGREL}_arm64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libssc-deb
          path: libssc_*.deb

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: libssc
          name: "libssc"
          draft: false
          prerelease: false
          files: "*.deb"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
